name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Randomblock1/theos-action@v1
      - uses: actions/upload-artifact@v4
        with:
          name: MyDylib
          path: .theos/obj/debug/GameCenterHook.dylib
